version: "2"
run:
  tests: false

formatters:
  enable:
    - gci
    - gofmt
    - gofumpt
    - goimports
  settings:
    gofumpt:
      extra-rules: true
  exclusions:
    generated: lax

linters:
  default: all
  disable:
    - depguard
    - dogsled
    - err113
    - exhaustive
    - exhaustruct
    - forcetypeassert
    - funcorder
    - funlen
    - gochecknoglobals
    - gochecknoinits
    - gocyclo
    - gomoddirectives
    - ireturn
    - mnd
    - musttag
    - nilerr
    - nlreturn
    - noinlineerr
    - nonamedreturns
    - varnamelen
    - wrapcheck
    - wsl
    - wsl_v5
  settings:
    cyclop:
      max-complexity: 20
    gosec:
      excludes:
        - G115
        - G302
        - G306
    lll:
      line-length: 160
    perfsprint:
      error-format: false
  exclusions:
    generated: lax
    rules:
      - linters:
          - noctx
        path: module/client.go
      - linters:
          - prealloc
        path: internal/modules/vendor.go
      - path: (.+)\.go$
        text: 'ST1000: at least one file in a package should have a package comment'
      - path: (.+)\.go$
        text: 'package-comments: should have a package comment'
