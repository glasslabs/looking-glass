on:
  push:
    tags:
      - '*'

name: release

permissions:
  contents: write

jobs:
  release:
    strategy:
      matrix:
        runs-on: [ubuntu-24.04, ubuntu-24.04-arm]
        variant:
          # Wayland-only: no X11 libs needed at build or runtime.
          - { name: wayland, tags: nox11,     apt: "libwayland-dev" }
          # X11-only: no Wayland libs needed at build or runtime.
          - { name: x11,     tags: nowayland, apt: "libx11-dev libx11-xcb-dev libxcursor-dev libxfixes-dev libxkbcommon-x11-dev" }
          # Full: both backends compiled in; requires both lib sets at runtime.
          - { name: full,    tags: "",        apt: "libwayland-dev libx11-dev libx11-xcb-dev libxcursor-dev libxfixes-dev libxkbcommon-x11-dev" }

    runs-on: ${{ matrix.runs-on }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup
        id: setup
        uses: ./.github/actions/setup
        with:
          variant-apt: ${{ matrix.variant.apt }}

      - name: Cache Go build cache
        uses: actions/cache@v5
        with:
          path: ${{ steps.setup.outputs.gocache }}
          key: ${{ runner.os }}-${{ matrix.runs-on }}-${{ matrix.variant.name }}-gobuild-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.runs-on }}-${{ matrix.variant.name }}-gobuild-

      - name: Build
        # Pass -tags only when the variant requires it; full variant uses no extra tags.
        run: go build ${TAGS:+-tags "$TAGS"} -o glass ./cmd/glass
        env:
          TAGS: ${{ matrix.variant.tags }}

      - name: Package
        run: zip "glass-${GITHUB_REF_NAME}-linux-$(go env GOARCH)-${{ matrix.variant.name }}.zip" glass

      - name: Upload release artifact
        run: gh release upload "${GITHUB_REF_NAME}" "glass-${GITHUB_REF_NAME}-linux-$(go env GOARCH)-${{ matrix.variant.name }}.zip"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
