on:
  push:
    tags:
      - '*'

name: release

permissions:
  contents: write

jobs:
  release:
    strategy:
      matrix:
        runs-on: [ubuntu-24.04, ubuntu-24.04-arm]

    runs-on: ${{ matrix.runs-on }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup
        id: setup
        uses: ./.github/actions/setup

      - name: Cache Go build cache
        uses: actions/cache@v5
        with:
          path: ${{ steps.setup.outputs.gocache }}
          key: ${{ runner.os }}-${{ matrix.runs-on }}-gobuild-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.runs-on }}-gobuild-

      - name: Build
        run: go build -o glass ./cmd/glass

      - name: Package
        run: zip "glass-${GITHUB_REF_NAME}-linux-$(go env GOARCH).zip" glass

      - name: Upload release artifact
        run: gh release upload "${GITHUB_REF_NAME}" "glass-${GITHUB_REF_NAME}-linux-$(go env GOARCH).zip"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
