on:
  push:
    branches:
      - main
  pull_request:

name: run tests

permissions:
  contents: read

jobs:
  lint:

    runs-on: ubuntu-24.04
    env:
      GOLANGCI_LINT_VERSION: v2.11.4

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup
        id: setup
        uses: ./.github/actions/setup

      - name: Run linter
        uses: golangci/golangci-lint-action@v9
        with:
          version: ${{ env.GOLANGCI_LINT_VERSION }}
  
  test:

    runs-on: ubuntu-24.04
    env:
      GOTESTSUM_VERSION: v1.13.0

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup
        id: setup
        uses: ./.github/actions/setup

      - name: Cache Go test cache
        uses: actions/cache@v5
        with:
          path: ${{ steps.setup.outputs.gocache }}
          key: ${{ runner.os }}-gotest-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-gotest-

      - name: Setup gotestsum
        run: go install gotest.tools/gotestsum@${{ env.GOTESTSUM_VERSION }}

      - name: Run Tests
        run: gotestsum --junitfile tests.xml --format pkgname -- -covermode=atomic -coverprofile=coverage.out -race ./...
  
  build:
    strategy:
      matrix:
        runs-on: [ubuntu-24.04, ubuntu-24.04-arm]
        variant:
          - { name: wayland     }
          - { name: x11         }
          - { name: full        }

    runs-on: ${{ matrix.runs-on }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup
        id: setup
        uses: ./.github/actions/setup
        with:
          variant: ${{ matrix.variant.name }}

      - name: Cache Go build cache
        uses: actions/cache@v5
        with:
          path: ${{ steps.setup.outputs.gocache }}
          key: ${{ runner.os }}-${{ matrix.runs-on }}-${{ matrix.variant.name }}-gobuild-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.runs-on }}-${{ matrix.variant.name }}-gobuild-

      - name: Build
        run: go build ${TAGS:+-tags "$TAGS"} ./cmd/glass
        env:
          TAGS: ${{ steps.setup.outputs.tags }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: glass-${{ matrix.runs-on }}-${{ matrix.variant.name }}
          path: glass

  ci:
    runs-on: ubuntu-latest
    needs: [lint, test, build]
    if: always()

    steps:
      - name: All checks passed
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            exit 1
          fi

