name: Setup
description: Install system dependencies, Go, and cache Go modules.

inputs:
  variant:
    description: "Gio window-system backend variant: wayland, x11, or full."
    required: false
    default: full

outputs:
  gomodcache:
    description: Go module cache path.
    value: ${{ steps.go-env.outputs.gomodcache }}
  gocache:
    description: Go build/test cache path.
    value: ${{ steps.go-env.outputs.gocache }}
  tags:
    description: Go build tags for the selected variant (empty string for full).
    value: ${{ steps.variant.outputs.tags }}

runs:
  using: composite
  steps:
    - name: Resolve variant
      id: variant
      shell: bash
      run: |
        case "${{ inputs.variant }}" in
          wayland)     TAGS="nox11"     ; PKGS="libwayland-dev" ;;
          x11)         TAGS="nowayland" ; PKGS="libx11-dev libx11-xcb-dev libxcursor-dev libxfixes-dev libxkbcommon-x11-dev" ;;
          framebuffer) TAGS="nox11 nowayland" ; PKGS="" ;;
          full)        TAGS=""          ; PKGS="libwayland-dev libx11-dev libx11-xcb-dev libxcursor-dev libxfixes-dev libxkbcommon-x11-dev" ;;
          *) echo "Unknown variant: ${{ inputs.variant }}" >&2; exit 1 ;;
        esac
        echo "tags=${TAGS}"   >> "$GITHUB_OUTPUT"
        echo "pkgs=${PKGS}"   >> "$GITHUB_OUTPUT"

    - name: Install dependencies
      shell: bash
      run: |
        make fonts
        sudo apt-get update
        # libegl-dev libvulkan-dev libxkbcommon-dev are needed by every variant (GPU rendering + keyboard).
        # shellcheck disable=SC2086
        sudo apt-get install -y \
          libegl-dev libvulkan-dev libxkbcommon-dev \
          ${{ steps.variant.outputs.pkgs }}

    - name: Install Go
      uses: actions/setup-go@v6
      with:
        go-version-file: 'go.mod'
        cache: false

    - name: Get Go paths
      id: go-env
      shell: bash
      run: |
        echo "gomodcache=$(go env GOMODCACHE)" >> "$GITHUB_OUTPUT"
        echo "gocache=$(go env GOCACHE)"       >> "$GITHUB_OUTPUT"

    - name: Cache Go modules
      id: mod-cache
      uses: actions/cache@v4
      with:
        path: ${{ steps.go-env.outputs.gomodcache }}
        key: ${{ runner.os }}-gomod-${{ hashFiles('**/go.sum') }}
        restore-keys: |
          ${{ runner.os }}-gomod-

    - name: Download dependencies
      shell: bash
      run: go mod download
      if: steps.mod-cache.outputs.cache-hit != 'true'
